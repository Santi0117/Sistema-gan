services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema-gan-postgres
    environment:
      POSTGRES_USER: sistemaganuser
      POSTGRES_PASSWORD: sistemaganpass
      POSTGRES_DB: sistemagandb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sistemaganuser -d sistemagandb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sistema-gan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistema-gan-app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: "postgresql://sistemaganuser:sistemaganpass@postgres:5432/sistemagandb"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
